<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 60px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.75rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 14px;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item span {
      flex: 1;
      font-size: 1rem;
      color: #374151;
      word-break: break-word;
    }

    .todo-item span.done {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .todo-item .complete-btn {
      background: none;
      border: 2px solid #4f46e5;
      color: #4f46e5;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .todo-item .complete-btn:hover {
      background: #4f46e5;
      color: #fff;
    }

    .todo-item .delete-btn {
      background: none;
      border: 2px solid #ef4444;
      color: #ef4444;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .todo-item .delete-btn:hover {
      background: #ef4444;
      color: #fff;
    }

    .empty-state {
      text-align: center;
      color: #9ca3af;
      font-size: 0.95rem;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo List</h1>

    <div class="input-row">
      <input
        type="text"
        id="todo-input"
        placeholder="Add a new task…"
        aria-label="New todo"
        maxlength="200"
      />
      <button id="add-btn">Add</button>
    </div>

    <ul id="todo-list">
      <li class="empty-state" id="empty-msg">No tasks yet — add one above!</li>
    </ul>
  </div>

  <script>
    const input    = document.getElementById('todo-input');
    const addBtn   = document.getElementById('add-btn');
    const list     = document.getElementById('todo-list');
    const emptyMsg = document.getElementById('empty-msg');

    function updateEmptyState() {
      const hasTodos = list.querySelectorAll('.todo-item').length > 0;
      emptyMsg.style.display = hasTodos ? 'none' : 'block';
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) {
        input.focus();
        return;
      }

      const li = document.createElement('li');
      li.className = 'todo-item';

      const span = document.createElement('span');
      span.textContent = text;

      const completeBtn = document.createElement('button');
      completeBtn.className = 'complete-btn';
      completeBtn.textContent = 'Done';
      completeBtn.setAttribute('aria-label', 'Mark as done');
      completeBtn.addEventListener('click', () => {
        span.classList.toggle('done');
        completeBtn.textContent = span.classList.contains('done') ? 'Undo' : 'Done';
      });

      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn';
      deleteBtn.textContent = 'Delete';
      deleteBtn.setAttribute('aria-label', 'Delete todo');
      deleteBtn.addEventListener('click', () => {
        li.remove();
        updateEmptyState();
      });

      li.appendChild(span);
      li.appendChild(completeBtn);
      li.appendChild(deleteBtn);
      list.appendChild(li);

      input.value = '';
      input.focus();
      updateEmptyState();
    }

    addBtn.addEventListener('click', addTodo);

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTodo();
    });

    updateEmptyState();
  </script>
</body>
</html>
